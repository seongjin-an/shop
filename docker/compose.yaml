services:
  mysql:
    image: mysql:8.0.33
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: shop
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "23306:3306"
    volumes:
      - ./.data/mysql:/var/lib/mysql
  redis:
    image: redis:7.4.0
    ports:
      - "16379:6379"
    volumes:
      - ./.data/redis:/data/
  redis-insight:
    image: redis/redisinsight:2.64.1
    restart: unless-stopped
    ports:
      - "15540:5540"
    volumes:
      - ./.data/redis-insight:/data
  kafka:
    image: confluentinc/cp-kafka:7.5.1 # Apache Kafka 3.5.x = Confluent Platform 7.5.x
    container_name: kafka
    ports:
      - "9092:9092"       # 컨테이너 브로커
      - "9094:9094"       # 호스트용 PLAINTEXT_HOST
    environment:
      # KRaft 필수 설정
      KAFKA_NODE_ID: 1  # 브로커 노드 ID
      CLUSTER_ID: 'EpwKlK0lR6qKZW0cGwZz8w'  # 클러스터 고유 식별자

      # 리스너 설정
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093'
      #      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'

      # KRaft 모드 설정
      KAFKA_PROCESS_ROLES: 'broker,controller'  # 브로커와 컨트롤러 역할 통합
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'  # 컨트롤러 쿼럼 설정
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'  # 컨트롤러 통신용 리스너

      # 복제 관련 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ./.data/kafka:/var/lib/kafka/data
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - '18090:8080'
    environment:
      - KAFKA_CLUSTERS_0_NAME=Local-Kafka-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    volumes:
      - ./.data/kafkaui:/etc/kafkaui
    depends_on:
      - kafka

  # ──────────────────────────────────────────
  # 로그 수집 스택: Loki + Promtail + Grafana
  # 접속: http://localhost:13000  (admin / admin)
  # ──────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    ports:
      - "13100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./.data/loki:/loki
    command: -config.file=/etc/loki/loki-config.yml

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # 각 서비스 하위 logs/ 를 개별 마운트 → build.gradle bootRun 에서 LOG_PATH=projectDir/logs 로 주입
      - ../shop-stock/logs:/logs/shop-stock:ro
      - ../shop-order/logs:/logs/shop-order:ro
      - ../shop-payment/logs:/logs/shop-payment:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # Tempo ↔ Loki 상호 링크 렌더링에 필요
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceToMetrics
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./.data/grafana:/var/lib/grafana
    depends_on:
      - loki
      - tempo

  # ──────────────────────────────────────────
  # 분산 트레이싱 스택: Tempo + OTel Collector
  # Tempo:        http://localhost:13200
  # OTel gRPC:    localhost:14317  (서비스 → collector → tempo)
  # OTel HTTP:    localhost:14318
  # ──────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "13200:3200"   # Tempo UI / API
      - "14317:4317"   # (미사용, collector 경유)
    volumes:
      - ./tempo-config.yml:/etc/tempo/tempo.yml:ro
      - ./.data/tempo:/var/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/otel-collector-config.yml"]
    ports:
      - "24317:4317"   # gRPC OTLP (서비스가 여기로 전송)
      - "24318:4318"   # HTTP OTLP
      - "28888:8888"   # collector 자체 메트릭
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/otel-collector-config.yml:ro
    depends_on:
      - tempo
      - loki